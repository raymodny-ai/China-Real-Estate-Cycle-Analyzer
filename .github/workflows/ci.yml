# CI/CD Pipeline for China Real Estate Cycle Analyzer
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# 环境变量
env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 代码质量检查
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff linter
        run: ruff check src/ --output-format=github

      - name: Run MyPy type checker
        run: |
          pip install pandas sqlalchemy scipy streamlit plotly pyyaml requests
          mypy src/ --ignore-missing-imports --no-error-summary

  # ─────────────────────────────────────────────────────────────────────────
  # 测试
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/ \
            --verbose \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests

  # ─────────────────────────────────────────────────────────────────────────
  # 类型检查
  # ─────────────────────────────────────────────────────────────────────────
  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas sqlalchemy scipy streamlit plotly pyyaml requests mypy pydantic

      - name: Run MyPy
        run: |
          mypy src/ \
            --ignore-missing-imports \
            --strict-optional \
            --warn-unused-configs \
            --show-error-codes

  # ─────────────────────────────────────────────────────────────────────────
  # 构建与打包
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Check package
        run: |
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ─────────────────────────────────────────────────────────────────────────
  # Streamlit 应用测试
  # ─────────────────────────────────────────────────────────────────────────
  streamlit-test:
    name: Streamlit App Test
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install streamlit-playwright

      - name: Generate test data
        run: |
          python -c "
            import sys
            sys.path.insert(0, '.')
            from src.data_fetchers.macro_data import fetch_aci_data
            from src.data_fetchers.financial_data import fetch_fpi_data
            from src.data_fetchers.land_data import fetch_lpr_data
            from src.data_fetchers.run_all import main
            main()
          "

      - name: Build Streamlit app
        run: |
          streamlit build app.py --static --server.headless true

      - name: Run Playwright tests
        run: |
          playwright install chromium
          pytest tests/e2e/ -v

  # ─────────────────────────────────────────────────────────────────────────
  # Docker 构建 (可选)
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            china-re-analyzer:latest
            china-re-analyzer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # 部署 (仅在 main 分支)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://china-re-analyzer.example.com

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/china-re-analyzer
            docker-compose pull
            docker-compose up -d
